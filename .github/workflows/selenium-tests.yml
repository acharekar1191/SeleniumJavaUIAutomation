name: Selenium Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      env:
        description: 'Environment'
        required: true
        default: 'qa'
        type: choice
        options:
          - qa
          - stage
          - uat
          - prod
      browser:
        description: 'Browser override (blank = use suite defaults from testng_sanity.xml)'
        required: false
        type: choice
        default: ''
        options:
          - ''
          - chrome
          - firefox

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      RUN_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.env || 'qa' }}
      RUN_BROWSER: ${{ github.event_name == 'workflow_dispatch' && inputs.browser || '' }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run Selenium test suite
        run: |
          echo "Environment: $RUN_ENV"
          echo "Browser override: ${RUN_BROWSER:-<suite defaults>}"
          if [ -n "$RUN_BROWSER" ]; then
            mvn clean test -Denv="$RUN_ENV" -Dbrowser="$RUN_BROWSER" -Dheadless=true
          else
            mvn clean test -Denv="$RUN_ENV" -Dheadless=true
          fi

      - name: Publish TestNG/Surefire results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          if-no-files-found: ignore

      - name: Upload Extent report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report
          path: build/TestExecutionReport.html
          if-no-files-found: ignore

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          if-no-files-found: ignore

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs
          path: logs/
          if-no-files-found: ignore

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/
          if-no-files-found: ignore
